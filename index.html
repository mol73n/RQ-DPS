<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RQ DPS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0e0f14;
    color: #c9cdd6;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }

  /* ===== КОРНЕВОЙ LAYOUT ===== */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 12px 16px;
    gap: 10px;
  }

  /* ===== CONTROLS ===== */
  .controls {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
  }

  /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
  .content {
    flex: 1;
    display: flex;
    gap: 10px;
    min-height: 0;
  }

  /* ===== ЛЕВАЯ ПАНЕЛЬ: ТАБЛИЦА ===== */
  .table-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    overflow: hidden;
  }

  .table-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #2a2d3a #161820;
  }

  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: #161820; }
  .table-scroll::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #161820;
    color: #5a6070;
    font-weight: normal;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid #2a2d3a;
  }

  td {
    padding: 6px 10px;
    border-bottom: 1px solid #1c1f2a;
    white-space: nowrap;
  }

  tbody tr:hover td { background: #1a1d28; cursor: pointer; }
  tbody tr.active-session td { background: #1a1f30; border-bottom-color: #2a3050; }

  /* чекбоксы */
  input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 13px;
    height: 13px;
    border: 1px solid #3a3d50;
    border-radius: 3px;
    background: #1e2130;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  input[type="checkbox"]:checked { border-color: var(--chk-color, #4a7fa5); background: var(--chk-color, #4a7fa5); }
  input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 2px solid #0e0f14;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }

  .color-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    opacity: 0.3;
    transition: opacity 0.15s;
  }
  tr.active-session .color-dot { opacity: 1; }

  /* ===== ПРАВАЯ ПАНЕЛЬ: ГРАФИК ===== */
  /* ===== РАЗДЕЛИТЕЛЬ ===== */
  .splitter {
    flex-shrink: 0;
    width: 5px;
    cursor: col-resize;
    background: #2a2d3a;
    border-radius: 3px;
    transition: background 0.15s;
    position: relative;
  }
  .splitter:hover, .splitter.dragging { background: #4a7fa5; }
  .splitter::after {
    content: '';
    position: absolute;
    inset: 0 -4px;
  }

  .chart-panel {
    width: 55%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    padding: 12px 14px;
    min-height: 0;
  }

  .chart-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chart-header span {
    color: #5a6070;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .chart-canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }

  #dpsChart {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
  }

  /* ===== ОБЩИЕ ===== */
  input[type="file"] { display: none; }

  .file-btn {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .file-btn:hover { background: #2a2d40; }
  .file-btn.has-file { border-color: #4a7fa5; color: #4a7fa5; }

  button {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.15s;
  }
  button:hover { background: #2a2d40; }

  select {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  select:focus, button:focus { outline: 1px solid #4a6fa5; }
  label { color: #555; font-size: 11px; white-space: nowrap; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #2a2d3a;
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 60px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a7fa5;
    cursor: pointer;
    transition: background 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { background: #5a8fb5; }
  input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a7fa5;
    border: none;
    cursor: pointer;
  }

  #result-empty { color: #444; text-align: center; padding: 20px; }

  /* ===== TOOLTIPS ===== */
  .tip-anchor {
    position: relative;
    cursor: default;
  }
  .tip-anchor::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e2130;
    border: 1px solid #3a3d50;
    color: #c9cdd6;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    max-width: 240px;
    text-align: center;
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    line-height: 1.5;
  }
  .tip-anchor:hover::after { opacity: 1; }

  /* плавающий tooltip через JS (для th и copy-btn) */
  #js-tooltip {
    position: fixed;
    background: #1e2130;
    border: 1px solid #3a3d50;
    color: #c9cdd6;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    max-width: 240px;
    text-align: center;
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 500;
    line-height: 1.5;
  }
  #js-tooltip.visible { opacity: 1; }
  #js-tooltip.success { border-color: #4caf50; color: #4caf50; }

  /* ===== МОДАЛЬНОЕ ОКНО ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    padding: 20px 24px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal h3 {
    font-size: 13px;
    font-weight: normal;
    color: #c9cdd6;
    letter-spacing: 0.05em;
    margin: 0;
  }

  .modal-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .modal-field label { color: #5a6070; font-size: 11px; }

  .modal-field input[type="text"],
  .modal-field input[type="number"] {
    background: #1e2130;
    border: 1px solid #3a3d50;
    border-radius: 4px;
    color: #c9cdd6;
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    width: 100%;
  }
  .modal-field input:focus { border-color: #4a7fa5; }

  .modal-error {
    font-size: 11px;
    color: #e05050;
    min-height: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-add-boss {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    transition: background 0.15s;
  }
  .btn-add-boss:hover { background: #2a2d40; border-color: #4a7fa5; color: #4a7fa5; }

  /* импортированные сессии */
  tr.imported-row td { color: #8a8fa0; font-style: italic; }
  tr.imported-row .color-dot { opacity: 0.5; }
  tr.imported-row.active-session td { color: #c9cdd6; }
  .imported-badge {
    display: inline-block;
    font-size: 9px;
    font-style: normal;
    background: #2a2d3a;
    color: #5a6070;
    border-radius: 3px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }
  .table-section-divider td {
    padding: 4px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #3a4050;
    background: #0e0f14;
    border-bottom: 1px solid #2a2d3a;
    cursor: default !important;
  }
</style>
</head>

<body>
<div class="app">

  <div class="controls">
    <input type="file" id="fileInput" accept=".htm,.html">
    <label for="fileInput" class="file-btn" id="fileLabel">📂 Открыть лог</label>
    <button id="refreshBtn">Обновить лог</button>
    <label>Босс:</label>
    <select id="targetSelect"></select>
    <button class="btn-add-boss" id="addBossBtn" title="Добавить босса">+</button>
    <button class="btn-add-boss" id="resetBossesBtn" title="Сбросить до стандартного списка" style="color:#e05050; border-color:#5a2a2a;">↺</button>
    <div style="width:1px; background:#2a2d3a; align-self:stretch; margin: 0 4px;"></div>
    <button id="exportBtn">⬆ Экспорт JSON</button>
    <input type="file" id="importInput" accept=".json">
    <label for="importInput" class="file-btn" id="importLabel">⬇ Импорт JSON</label>
    <div style="width:1px; background:#2a2d3a; align-self:stretch; margin: 0 4px;"></div>
    <button id="shareBtn">🔗 Поделиться</button>
    <input type="text" id="shareLinkInput" placeholder="Вставить ссылку..." style="
      background:#1e2130; color:#c9cdd6; border:1px solid #3a3d50;
      border-radius:4px; font-family:inherit; font-size:12px;
      padding:5px 8px; width:200px; outline:none;
    ">
    <button id="loadShareBtn">Загрузить</button>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Добавить босса</h3>
      <div class="modal-field">
        <label>Имя</label>
        <input type="text" id="modalName" placeholder="Имя босса">
      </div>
      <div class="modal-field">
        <label>HP</label>
        <input type="number" id="modalHp" placeholder="Количество HP" min="1">
      </div>
      <div class="modal-error" id="modalError"></div>
      <div class="modal-actions">
        <button id="modalCancel">Отмена</button>
        <button id="modalConfirm">Добавить</button>
      </div>
    </div>
  </div>

  <div class="content">

    <div class="table-panel">
      <div class="table-scroll">
        <table id="sessionsTable">
          <thead>
            <tr>
              <th></th>
              <th>#</th>
              <th>Начало</th>
              <th>Конец</th>
              <th>Время</th>
              <th>Урон</th>
              <th data-jstip="% от общего HP босса&#10;нанесённых за сессию">% HP</th>
              <th>Max Hit</th>
              <th>DPS</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sessionsBody">
            <tr><td colspan="9" id="result-empty">Нет данных</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="splitter" id="splitter"></div>

    <div class="chart-panel" id="chartPanel">
      <div class="chart-header">
        <span>DPS</span>
        <label style="margin-left:6px" class="tip-anchor" data-tip="Rolling DPS — среднее значение DPS&#10;за последние N секунд.&#10;Сглаживает резкие пики.">Окно:</label>
        <input type="range" id="rollingWindow" min="1" max="10" value="5" step="1">
        <span id="rollingWindowValue" style="color:#c9cdd6; min-width:24px">5s</span>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="dpsChart"></canvas>
      </div>
    </div>

  </div>
</div>

<div id="js-tooltip"></div>

<script>

const bosses = {
    "Архон": 9771080,
    "Баксбакуалануксивайе": 178354700,
    "Воко": 214548640,
    "Гигантская Тортолла": 39479610,
    "Денгур Кровавый топор": 186641800,
    "Деструктор": 22899550,
    "Древний Энт": 21784250,
    "Зверомор": 51371450,
    "Королева Крыс": 5189760,
    "Хьюго": 179809740,
    "Эдвард": 167511470,
    "Золотой Таракан": 2717280,
    "Советник Остина": 45012364,
    "Пламярык": 65146044,
    "Богатый Упырь": 5189760
};

let parsedRows = [];
let currentFile = null;
let currentTarget = null;
let currentSessions = [];
let importedSessions = []; // сессии загруженные из чужих JSON
let checkedSessions = new Set();
let chart = null;

const SESSION_COLORS = [
    { line: "#4a7fa5", fill: "rgba(74,127,165,0.07)",  avg: "rgba(74,127,165,0.7)"  },
    { line: "#e0724a", fill: "rgba(224,114,74,0.07)",  avg: "rgba(224,114,74,0.7)"  },
    { line: "#4caf50", fill: "rgba(76,175,80,0.07)",   avg: "rgba(76,175,80,0.7)"   },
    { line: "#b07fd4", fill: "rgba(176,127,212,0.07)", avg: "rgba(176,127,212,0.7)" },
    { line: "#f0c040", fill: "rgba(240,192,64,0.07)",  avg: "rgba(240,192,64,0.7)"  },
    { line: "#4ad4c8", fill: "rgba(74,212,200,0.07)",  avg: "rgba(74,212,200,0.7)"  },
];

// ===== КАСТОМНЫЕ БОССЫ ИЗ LOCALSTORAGE =====
const STORAGE_KEY = "rq_custom_bosses";
function loadCustomBosses() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveCustomBosses(custom) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(custom));
}

const customBosses = loadCustomBosses();
Object.assign(bosses, customBosses);

function rebuildBossSelect() {
    const select = document.getElementById("targetSelect");
    const prev = select.value;
    select.innerHTML = "";
    Object.keys(bosses).forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
    });
    if (prev && bosses[prev]) select.value = prev;
}

rebuildBossSelect();

document.getElementById("refreshBtn").addEventListener("click", function() {    if (!currentFile) { alert("Сначала выбери файл"); return; }
    readFile(currentFile);
});

document.getElementById("fileInput").addEventListener("change", function(e) {
    currentFile = e.target.files[0];
    if (!currentFile) return;
    const label = document.getElementById("fileLabel");
    label.textContent = "📄 " + currentFile.name;
    label.classList.add("has-file");
    this.value = "";
    readFile(currentFile);
});

document.getElementById("targetSelect").addEventListener("change", function() {
    currentTarget = this.value;
    setTimeout(() => processTarget(currentTarget), 0);
});

// ===== МОДАЛЬНОЕ ОКНО =====
const modalOverlay = document.getElementById("modalOverlay");
const modalName    = document.getElementById("modalName");
const modalHp      = document.getElementById("modalHp");
const modalError   = document.getElementById("modalError");

document.getElementById("addBossBtn").addEventListener("click", () => {
    modalName.value = "";
    modalHp.value = "";
    modalError.textContent = "";
    modalOverlay.classList.add("open");
    setTimeout(() => modalName.focus(), 50);
});

document.getElementById("modalCancel").addEventListener("click", () => {
    modalOverlay.classList.remove("open");
});

modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) modalOverlay.classList.remove("open");
});

document.getElementById("modalConfirm").addEventListener("click", () => {
    const name = modalName.value.trim();
    const hp   = parseInt(modalHp.value);

    if (!name)       { modalError.textContent = "Введите имя босса";       return; }
    if (bosses[name]){ modalError.textContent = "Такой босс уже существует"; return; }
    if (!hp || hp<=0){ modalError.textContent = "Введите корректное HP";    return; }

    bosses[name] = hp;
    const custom = loadCustomBosses();
    custom[name] = hp;
    saveCustomBosses(custom);

    rebuildBossSelect();
    document.getElementById("targetSelect").value = name;
    currentTarget = name;
    processTarget(name);

    modalOverlay.classList.remove("open");
});

[modalName, modalHp].forEach(el => {
    el.addEventListener("keydown", (e) => {
        if (e.key === "Enter")  document.getElementById("modalConfirm").click();
        if (e.key === "Escape") modalOverlay.classList.remove("open");
    });
});

// ===== СБРОС БОССОВ =====
document.getElementById("resetBossesBtn").addEventListener("click", () => {
    if (!confirm("Сбросить список боссов до стандартного?\nВсе добавленные вручную боссы будут удалены.")) return;
    const custom = loadCustomBosses();
    Object.keys(custom).forEach(name => delete bosses[name]);
    localStorage.removeItem(STORAGE_KEY);
    rebuildBossSelect();
    if (!bosses[currentTarget]) {
        currentTarget = document.getElementById("targetSelect").value;
        processTarget(currentTarget);
    }
});


// ===== ЭКСПОРТ JSON =====
document.getElementById("exportBtn").addEventListener("click", () => {
    if (checkedSessions.size === 0) { alert("Нет отмеченных сессий для экспорта"); return; }

    const toExport = [...checkedSessions]
        .filter(i => currentSessions[i] && !currentSessions[i]._imported)
        .map(i => ({
            target: currentSessions[i][0].target,
            hits: currentSessions[i].map(r => ({ damage: r.damage, time: r.time }))
        }));

    if (toExport.length === 0) { alert("Нет своих сессий для экспорта (импортированные не экспортируются)"); return; }

    const json = JSON.stringify({ version: 1, sessions: toExport }, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `rqdps_${currentTarget || "export"}_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
});

// ===== ИМПОРТ JSON =====
document.getElementById("importInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    this.value = "";

    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const data = JSON.parse(event.target.result);
            if (!data.sessions || !Array.isArray(data.sessions)) throw new Error();

            let added = 0;
            data.sessions.forEach(s => {
                if (!s.target || !Array.isArray(s.hits)) return;
                if (!bosses[s.target]) { bosses[s.target] = 0; rebuildBossSelect(); }
                const session = s.hits.map(h => ({ damage: h.damage, target: s.target, time: h.time }));
                session._imported = true;
                importedSessions.push(session);
                added++;
            });

            if (added === 0) { alert("В файле не найдено валидных сессий"); return; }

            const label = document.getElementById("importLabel");
            label.textContent = `⬇ Импорт JSON (${importedSessions.length})`;
            label.classList.add("has-file");

            processTarget(currentTarget);
        } catch {
            alert("Ошибка чтения файла. Убедитесь что это корректный RQ DPS JSON.");
        }
    };
    reader.readAsText(file);
});

function readFile(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
        const text = event.target.result;
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");
        const rows = doc.querySelectorAll("tr");

        parsedRows = [];
        const targets = new Set();

        rows.forEach(row => {
            const textContent = row.innerText;
            const match = textContent.match(/Вы нанесли (\d+) урона\. Цель: (.+)/);
            if (!match) return;
            const damage = parseInt(match[1]);
            if (damage <= 0) return;
            const target = match[2].trim();
            const time = row.getAttribute("title");
            if (!time) return;
            if (bosses[target]) {
                parsedRows.push({ damage, target, time });
                targets.add(target);
            }
        });

        if (!currentTarget) {
            currentTarget = document.getElementById("targetSelect").value;
        }
        processTarget(currentTarget);
    };
    reader.readAsText(file);
}

function processTarget(target) {
    if (!target) return;
    const filtered = parsedRows
        .filter(r => r.target === target)
        .sort((a, b) => parseTime(a.time) - parseTime(b.time));

    if (filtered.length === 0) { renderTable([]); return; }

    const sessions = [];
    let currentSession = [];
    const MAX_GAP = 5 * 60;

    for (let i = 0; i < filtered.length; i++) {
        const current = filtered[i];
        if (currentSession.length === 0) { currentSession.push(current); continue; }
        const prev = currentSession[currentSession.length - 1];
        const diff = (parseTime(current.time) - parseTime(prev.time)) / 1000;
        if (diff > MAX_GAP) { sessions.push(currentSession); currentSession = [current]; }
        else currentSession.push(current);
    }
    if (currentSession.length > 0) sessions.push(currentSession);
    renderTable(sessions);
}

function renderTable(sessions) {
    const tbody = document.getElementById("sessionsBody");
    tbody.innerHTML = "";
    currentSessions = [];
    checkedSessions = new Set();

    const ownEmpty = !sessions || sessions.length === 0;
    const filteredImported = importedSessions.filter(s => s[0] && s[0].target === currentTarget);
    const impEmpty = filteredImported.length === 0;

    if (ownEmpty && impEmpty) {
        tbody.innerHTML = `<tr><td colspan="10" style="color:#444; text-align:center; padding:20px">Боёв с этим боссом не найдено</td></tr>`;
        drawCheckedSessions();
        return;
    }

    // --- свои сессии ---
    if (!ownEmpty) {
        sessions.forEach((session) => {
            currentSessions.push(session);
            const idx = currentSessions.length - 1;
            checkedSessions.add(idx);
            tbody.appendChild(buildSessionRow(session, idx, false));
        });
    }

    // --- разделитель + импортированные ---
    if (!impEmpty) {
        if (!ownEmpty) {
            const divRow = document.createElement("tr");
            divRow.className = "table-section-divider";
            divRow.innerHTML = `<td colspan="10">Импортированные</td>`;
            tbody.appendChild(divRow);
        }
        filteredImported.forEach((session) => {
            currentSessions.push(session);
            const idx = currentSessions.length - 1;
            tbody.appendChild(buildSessionRow(session, idx, true));
        });
    }

    setTimeout(() => {
        updateRowHighlight();
        drawCheckedSessions();
    }, 0);
}

function buildSessionRow(session, idx, isImported) {
    let totalDamage = 0, maxHit = 0;
    session.forEach(r => {
        totalDamage += r.damage;
        if (r.damage > maxHit) maxHit = r.damage;
    });

    const start = parseTime(session[0].time);
    const end = parseTime(session[session.length - 1].time);
    const seconds = Math.floor((end - start) / 1000) || 1;
    const dps = totalDamage / seconds;
    const bossHP = bosses[session[0].target];
    const percent = bossHP ? (totalDamage / bossHP) * 100 : 0;
    const hpColor = getPercentColor(percent);
    const c = SESSION_COLORS[idx % SESSION_COLORS.length];

    const tr = document.createElement("tr");
    tr.id = `session-row-${idx}`;
    if (isImported) tr.classList.add("imported-row");

    const tdChk = document.createElement("td");
    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.checked = !isImported;
    chk.style.setProperty("--chk-color", c.line);
    chk.addEventListener("change", (e) => {
        e.stopPropagation();
        if (chk.checked) checkedSessions.add(idx);
        else checkedSessions.delete(idx);
        updateRowHighlight();
        drawCheckedSessions();
    });
    tdChk.appendChild(chk);
    tr.appendChild(tdChk);

    const badge = isImported ? `<span class="imported-badge">imported</span>` : "";
    tr.insertAdjacentHTML("beforeend", `
        <td><span class="color-dot" style="background:${c.line}"></span>${idx + 1}${badge}</td>
        <td>${session[0].time}</td>
        <td>${session[session.length - 1].time}</td>
        <td>${seconds}s</td>
        <td>${formatNumber(totalDamage)}</td>
        <td style="color:${hpColor}">${percent.toFixed(2)}%</td>
        <td>${formatNumber(maxHit)}</td>
        <td>${formatNumber(Math.floor(dps))}</td>
        <td><button class="copy-btn" onclick="event.stopPropagation(); copyRow(this, ${seconds}, ${totalDamage}, ${dps}, ${percent}, '${session[0].target.replace(/'/g, "\\'")}')">📋</button></td>
    `);

    tr.addEventListener("click", () => toggleSessionCheck(idx));
    return tr;
}

function toggleSessionCheck(index) {
    const chk = document.querySelector(`#session-row-${index} input[type=checkbox]`);
    if (!chk) return;
    chk.checked = !chk.checked;
    if (chk.checked) checkedSessions.add(index);
    else checkedSessions.delete(index);
    updateRowHighlight();
    drawCheckedSessions();
}

function updateRowHighlight() {
    document.querySelectorAll("#sessionsBody tr").forEach((row, i) => {
        const dot = row.querySelector(".color-dot");
        if (checkedSessions.has(i)) {
            row.classList.add("active-session");
            if (dot) dot.style.opacity = "1";
        } else {
            row.classList.remove("active-session");
            if (dot) dot.style.opacity = "0.25";
        }
    });
}

document.getElementById("rollingWindow").addEventListener("input", function() {
    document.getElementById("rollingWindowValue").textContent = this.value + "s";
    drawCheckedSessions();
});

function drawCheckedSessions() {
    const windowSize = parseInt(document.getElementById("rollingWindow").value);
    const datasets = [];

    if (checkedSessions.size === 0) {
        drawChart([], [], windowSize);
        return;
    }

    const maxLen = Math.max(...[...checkedSessions].map(i => {
        const s = currentSessions[i];
        if (!s) return 0;
        const start = parseTime(s[0].time);
        const end = parseTime(s[s.length - 1].time);
        return Math.floor((end - start) / 1000) + 1;
    }));

    checkedSessions.forEach(i => {
        const session = currentSessions[i];
        if (!session) return;
        const c = SESSION_COLORS[i % SESSION_COLORS.length];
        const raw = buildDpsTimeline(session);
        const rolling = buildRollingDps(raw, windowSize);
        const totalDamage = session.reduce((s, r) => s + r.damage, 0);
        const start = parseTime(session[0].time);
        const end = parseTime(session[session.length - 1].time);
        const seconds = Math.floor((end - start) / 1000) || 1;
        const avgDps = Math.round(totalDamage / seconds);

        datasets.push({
            label: `#${i + 1} Rolling`,
            data: rolling,
            borderColor: c.line,
            backgroundColor: c.fill,
            borderWidth: 2,
            tension: 0.3,
            pointRadius: 0,
            fill: true
        });
        datasets.push({
            label: `#${i + 1} Avg`,
            data: Array(maxLen).fill(avgDps),
            borderColor: c.avg,
            borderWidth: 1,
            borderDash: [6, 3],
            pointRadius: 0,
            fill: false,
            tension: 0
        });
    });

    const labels = Array.from({ length: maxLen }, (_, i) => i + "s");
    drawChart(labels, datasets, windowSize);
}

function buildDpsTimeline(session) {
    const timeline = [];
    const start = parseTime(session[0].time);
    session.forEach(hit => {
        const sec = Math.floor((parseTime(hit.time) - start) / 1000);
        if (!timeline[sec]) timeline[sec] = 0;
        timeline[sec] += hit.damage;
    });
    return timeline.map(v => v || 0);
}

function buildRollingDps(data, windowSize = 5) {
    const result = [];
    for (let i = 0; i < data.length; i++) {
        let sum = 0, count = 0;
        for (let j = i; j > i - windowSize && j >= 0; j--) { sum += data[j]; count++; }
        result.push(Math.round(sum / count));
    }
    return result;
}

function drawChart(labels, datasets, windowSize) {
    const ctx = document.getElementById("dpsChart").getContext("2d");
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 200 },
            interaction: { mode: "index", intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: "#1e2130",
                    borderColor: "#3a3d50",
                    borderWidth: 1,
                    titleColor: "#5a6070",
                    bodyColor: "#c9cdd6",
                    titleFont: { family: "'Courier New', monospace", size: 10 },
                    bodyFont: { family: "'Courier New', monospace", size: 11 },
                    padding: 8,
                    filter: item => true,
                    callbacks: {
                        label: function(ctx) {
                            const isAvg = ctx.dataset.label.includes("Avg");
                            const prefix = isAvg ? "avg" : "dps";
                            const sessionNum = ctx.dataset.label.match(/#(\d+)/)?.[1] ?? "";
                            return ` #${sessionNum} ${prefix}: ${ctx.parsed.y.toLocaleString("ru-RU")}`;
                        }
                    }
                }
            },
            scales: {
                x: { ticks: { color: "#3a4050", font: { size: 10 } }, grid: { color: "#1a1d28" } },
                y: { ticks: { color: "#3a4050", font: { size: 10 } }, grid: { color: "#1a1d28" } }
            }
        }
    });
}

function parseTime(t) {
    const [date, time] = t.split(" ");
    return new Date(`2024/${date} ${time}`);
}

function formatNumber(num) { return num.toLocaleString("ru-RU"); }

function getPercentColor(percent) {
    if (percent >= 15) return "#f0a830";
    if (percent >= 10) return "#eb9f34";
    return "#348ceb";
}

// ===== SPLITTER =====
(function() {
    const splitter = document.getElementById("splitter");
    const chartPanel = document.getElementById("chartPanel");
    const content = splitter.parentElement;
    let startX, startWidth;

    splitter.addEventListener("mousedown", function(e) {
        startX = e.clientX;
        startWidth = chartPanel.offsetWidth;
        splitter.classList.add("dragging");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";

        function onMove(e) {
            const delta = startX - e.clientX;
            const newWidth = Math.max(200, Math.min(content.offsetWidth - 200, startWidth + delta));
            chartPanel.style.width = newWidth + "px";
            if (chart) chart.resize();
        }

        function onUp() {
            splitter.classList.remove("dragging");
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
        }

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
    });
})();

// ===== ШЕРИНГ ЧЕРЕЗ URL =====
document.getElementById("shareBtn").addEventListener("click", () => {
    if (checkedSessions.size === 0) {
        alert("Нет отмеченных сессий для шеринга");
        return;
    }

    const toShare = [...checkedSessions]
        .filter(i => currentSessions[i])
        .map(i => ({
            target: currentSessions[i][0].target,
            hits: currentSessions[i].map(r => ({ damage: r.damage, time: r.time }))
        }));

    if (toShare.length === 0) { alert("Нет сессий для шеринга"); return; }

    const json = JSON.stringify({ version: 1, sessions: toShare });
    const compressed = LZString.compressToEncodedURIComponent(json);
    const url = location.href.split('#')[0] + '#share=' + compressed;

    navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById("shareBtn");
        const orig = btn.textContent;
        btn.textContent = "✓ Скопировано!";
        setTimeout(() => btn.textContent = orig, 2000);
    });
});

document.getElementById("loadShareBtn").addEventListener("click", () => {
    const raw = document.getElementById("shareLinkInput").value.trim();
    if (!raw) { alert("Вставьте ссылку"); return; }

    // поддерживаем как полный URL так и просто hash-часть
    let compressed;
    try {
        const hash = raw.includes('#share=') ? raw.split('#share=')[1] : raw;
        compressed = hash;
        if (!compressed) throw new Error();
    } catch {
        alert("Неверный формат ссылки");
        return;
    }

    let data;
    try {
        const json = LZString.decompressFromEncodedURIComponent(compressed);
        if (!json) throw new Error();
        data = JSON.parse(json);
        if (!data.sessions || !Array.isArray(data.sessions)) throw new Error();
    } catch {
        alert("Не удалось декодировать ссылку. Проверьте что ссылка скопирована полностью.");
        return;
    }

    let added = 0;
    data.sessions.forEach(s => {
        if (!s.target || !Array.isArray(s.hits)) return;
        if (!bosses[s.target]) { bosses[s.target] = 0; rebuildBossSelect(); }
        const session = s.hits.map(h => ({ damage: h.damage, target: s.target, time: h.time }));
        session._imported = true;
        importedSessions.push(session);
        added++;
    });

    if (added === 0) { alert("В ссылке не найдено валидных сессий"); return; }

    document.getElementById("shareLinkInput").value = "";
    const label = document.getElementById("importLabel");
    label.textContent = `⬇ Импорт JSON (${importedSessions.length})`;
    label.classList.add("has-file");

    processTarget(currentTarget);
});

// автозагрузка при открытии файла с #share= в URL
(function() {
    const hash = location.hash;
    if (!hash.startsWith('#share=')) return;
    const compressed = hash.slice(7);
    try {
        const json = LZString.decompressFromEncodedURIComponent(compressed);
        if (!json) return;
        const data = JSON.parse(json);
        if (!data.sessions) return;
        data.sessions.forEach(s => {
            if (!s.target || !Array.isArray(s.hits)) return;
            if (!bosses[s.target]) { bosses[s.target] = 0; rebuildBossSelect(); }
            const session = s.hits.map(h => ({ damage: h.damage, target: s.target, time: h.time }));
            session._imported = true;
            importedSessions.push(session);
        });
        if (importedSessions.length > 0) {
            // переключаемся на босса из ссылки
            const firstTarget = data.sessions[0]?.target;
            if (firstTarget && bosses[firstTarget]) {
                document.getElementById("targetSelect").value = firstTarget;
                currentTarget = firstTarget;
            }
            processTarget(currentTarget);
            // убираем hash из URL чтобы не мешал
            history.replaceState(null, '', location.pathname);
        }
    } catch {}
})();

// ===== JS TOOLTIP =====
const jsTooltip = document.getElementById("js-tooltip");
let jsTipTimer = null;

function showJsTip(text, x, y, isSuccess = false) {
    clearTimeout(jsTipTimer);
    jsTooltip.textContent = text;
    jsTooltip.classList.toggle("success", isSuccess);
    jsTooltip.style.left = x + "px";
    jsTooltip.style.top  = y + "px";
    jsTooltip.classList.add("visible");
}

function hideJsTip(delay = 0) {
    jsTipTimer = setTimeout(() => jsTooltip.classList.remove("visible"), delay);
}

// hover для data-jstip элементов (th и подобные)
document.addEventListener("mouseover", (e) => {
    const el = e.target.closest("[data-jstip]");
    if (!el) return;
    const r = el.getBoundingClientRect();
    showJsTip(el.dataset.jstip, r.left + r.width / 2 - 60, r.bottom + 6);
});
document.addEventListener("mouseout", (e) => {
    if (e.target.closest("[data-jstip]")) hideJsTip(100);
});

function copyRow(btn, seconds, dmg, dps, percent, bossName) {
    const text =
`босс: ${bossName}
t: ${seconds}s
dmg: ${formatNumber(dmg)}
dps: ${formatNumber(Math.floor(dps))}
hp: ${percent.toFixed(2)}%`;
    navigator.clipboard.writeText(text);

    const r = btn.getBoundingClientRect();
    showJsTip("Скопировано!", r.left + r.width / 2 - 40, r.bottom + 6, true);
    hideJsTip(1500);
}
