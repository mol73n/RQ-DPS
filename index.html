<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RQ DPS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0e0f14;
    color: #c9cdd6;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }

  /* ===== КОРНЕВОЙ LAYOUT ===== */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 12px 16px;
    gap: 10px;
  }

  /* ===== CONTROLS ===== */
  .controls {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
  }

  /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
  .content {
    flex: 1;
    display: flex;
    gap: 10px;
    min-height: 0;
  }

  /* ===== ЛЕВАЯ ПАНЕЛЬ: ТАБЛИЦА ===== */
  .table-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    overflow: hidden;
  }

  .table-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #2a2d3a #161820;
  }

  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: #161820; }
  .table-scroll::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #161820;
    color: #5a6070;
    font-weight: normal;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid #2a2d3a;
  }

  td {
    padding: 6px 10px;
    border-bottom: 1px solid #1c1f2a;
    white-space: nowrap;
  }

  tbody tr:hover td { background: #1a1d28; cursor: pointer; }
  tbody tr.active-session td { background: #1a1f30; border-bottom-color: #2a3050; }

  /* ===== ПРАВАЯ ПАНЕЛЬ: ГРАФИК ===== */
  /* ===== РАЗДЕЛИТЕЛЬ ===== */
  .splitter {
    flex-shrink: 0;
    width: 5px;
    cursor: col-resize;
    background: #2a2d3a;
    border-radius: 3px;
    transition: background 0.15s;
    position: relative;
  }
  .splitter:hover, .splitter.dragging { background: #4a7fa5; }
  .splitter::after {
    content: '';
    position: absolute;
    inset: 0 -4px;
  }

  .chart-panel {
    width: 60%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #161820;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    padding: 12px 14px;
    min-height: 0;
  }

  .chart-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chart-header span {
    color: #5a6070;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .chart-canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }

  #dpsChart {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
  }

  /* ===== ОБЩИЕ ===== */
  input[type="file"] { display: none; }

  .file-btn {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .file-btn:hover { background: #2a2d40; }
  .file-btn.has-file { border-color: #4a7fa5; color: #4a7fa5; }

  button {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.15s;
  }
  button:hover { background: #2a2d40; }

  select {
    background: #1e2130;
    color: #c9cdd6;
    border: 1px solid #3a3d50;
    padding: 5px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  select:focus, button:focus { outline: 1px solid #4a6fa5; }
  label { color: #555; font-size: 11px; white-space: nowrap; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #2a2d3a;
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 60px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a7fa5;
    cursor: pointer;
    transition: background 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { background: #5a8fb5; }
  input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a7fa5;
    border: none;
    cursor: pointer;
  }

  #result-empty { color: #444; text-align: center; padding: 20px; }
</style>
</head>

<body>
<div class="app">

  <div class="controls">
    <input type="file" id="fileInput" accept=".htm,.html">
    <label for="fileInput" class="file-btn" id="fileLabel">📂 Открыть лог</label>
    <button id="refreshBtn">Обновить лог</button>
    <label>Босс:</label>
    <select id="targetSelect"></select>
  </div>

  <div class="content">

    <div class="table-panel">
      <div class="table-scroll">
        <table id="sessionsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Начало</th>
              <th>Конец</th>
              <th>Время</th>
              <th>Урон</th>
              <th>% HP</th>
              <th>Max Hit</th>
              <th>DPS</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sessionsBody">
            <tr><td colspan="9" id="result-empty">Нет данных</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="splitter" id="splitter"></div>

    <div class="chart-panel" id="chartPanel">
      <div class="chart-header">
        <span>DPS</span>
        <label>Сессия:</label>
        <select id="sessionSelect"></select>
        <label style="margin-left:6px">Окно:</label>
        <input type="range" id="rollingWindow" min="1" max="10" value="5" step="1">
        <span id="rollingWindowValue" style="color:#c9cdd6; min-width:24px">5s</span>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="dpsChart"></canvas>
      </div>
    </div>

  </div>
</div>

<script>

const bosses = {
    "Архон": 9771080,
    "Баксбакуалануксивайе": 178354700,
    "Воко": 214548640,
    "Гигантская Тортолла": 39479610,
    "Денгур Кровавый топор": 186641800,
    "Деструктор": 22899550,
    "Древний Энт": 21784250,
    "Зверомор": 51371450,
    "Королева Крыс": 5189760,
    "Хьюго": 179809740,
    "Эдвард": 167511470,
    "Золотой Таракан": 2717280,
    "Советник Остина": 45012364,
    "Пламярык": 65146044,
    "Богатый Упырь": 5189760
};

let parsedRows = [];
let currentFile = null;
let currentTarget = null;
let currentSessions = [];
let chart = null;

const select = document.getElementById("targetSelect");
Object.keys(bosses).forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
});

document.getElementById("fileInput").addEventListener("change", function(e) {
    currentFile = e.target.files[0];
    if (!currentFile) return;
    const label = document.getElementById("fileLabel");
    label.textContent = "📄 " + currentFile.name;
    label.classList.add("has-file");
    readFile(currentFile, true);
});

document.getElementById("refreshBtn").addEventListener("click", function() {
    if (!currentFile) { alert("Сначала выбери файл"); return; }
    readFile(currentFile, false);
});

document.getElementById("targetSelect").addEventListener("change", function() {
    currentTarget = this.value;
    setTimeout(() => processTarget(currentTarget), 0);
});

document.getElementById("sessionSelect").addEventListener("change", function() {
    const index = parseInt(this.value);
    drawChartForSession(index);
    highlightTableRow(index);
});

function readFile(file, rebuildTargets) {
    const reader = new FileReader();
    reader.onload = function(event) {
        const text = event.target.result;
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");
        const rows = doc.querySelectorAll("tr");

        parsedRows = [];
        const targets = new Set();

        rows.forEach(row => {
            const textContent = row.innerText;
            const match = textContent.match(/Вы нанесли (\d+) урона\. Цель: (.+)/);
            if (!match) return;
            const damage = parseInt(match[1]);
            if (damage <= 0) return;
            const target = match[2].trim();
            const time = row.getAttribute("title");
            if (!time) return;
            if (bosses[target]) {
                parsedRows.push({ damage, target, time });
                targets.add(target);
            }
        });

        const select = document.getElementById("targetSelect");
        if (rebuildTargets) {
            select.innerHTML = "";
            targets.forEach(t => {
                const option = document.createElement("option");
                option.value = t;
                option.textContent = t;
                select.appendChild(option);
            });
            if (select.options.length > 0) {
                const first = select.options[0].value;
                select.value = first;
                currentTarget = first;
                processTarget(first);
            }
        } else {
            if (currentTarget) processTarget(currentTarget);
        }
    };
    reader.readAsText(file);
}

function processTarget(target) {
    if (!target) return;
    const filtered = parsedRows
        .filter(r => r.target === target)
        .sort((a, b) => parseTime(a.time) - parseTime(b.time));

    if (filtered.length === 0) { renderTable([]); return; }

    const sessions = [];
    let currentSession = [];
    const MAX_GAP = 5 * 60;

    for (let i = 0; i < filtered.length; i++) {
        const current = filtered[i];
        if (currentSession.length === 0) { currentSession.push(current); continue; }
        const prev = currentSession[currentSession.length - 1];
        const diff = (parseTime(current.time) - parseTime(prev.time)) / 1000;
        if (diff > MAX_GAP) { sessions.push(currentSession); currentSession = [current]; }
        else currentSession.push(current);
    }
    if (currentSession.length > 0) sessions.push(currentSession);
    renderTable(sessions);
}

function renderTable(sessions) {
    const tbody = document.getElementById("sessionsBody");
    tbody.innerHTML = "";

    if (!sessions || sessions.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" id="result-empty">Нет данных</td></tr>`;
        currentSessions = [];
        rebuildSessionSelect([]);
        return;
    }

    currentSessions = sessions;
    rebuildSessionSelect(sessions);

    sessions.forEach((session, i) => {
        if (!session || session.length === 0) return;

        let totalDamage = 0, maxHit = 0;
        session.forEach(r => {
            totalDamage += r.damage;
            if (r.damage > maxHit) maxHit = r.damage;
        });

        const start = parseTime(session[0].time);
        const end = parseTime(session[session.length - 1].time);
        const seconds = Math.floor((end - start) / 1000) || 1;
        const dps = totalDamage / seconds;
        const bossHP = bosses[session[0].target];
        const percent = bossHP ? (totalDamage / bossHP) * 100 : 0;
        const color = getPercentColor(percent);

        const tr = document.createElement("tr");
        tr.id = `session-row-${i}`;
        tr.innerHTML = `
            <td style="color:#555">${i + 1}</td>
            <td>${session[0].time}</td>
            <td>${session[session.length - 1].time}</td>
            <td>${seconds}s</td>
            <td>${formatNumber(totalDamage)}</td>
            <td style="color:${color}">${percent.toFixed(2)}%</td>
            <td>${formatNumber(maxHit)}</td>
            <td>${formatNumber(Math.floor(dps))}</td>
            <td><button onclick="event.stopPropagation(); copyRow(${seconds}, ${totalDamage}, ${dps}, ${percent})">📋</button></td>
        `;
        tr.addEventListener("click", () => selectSessionFromTable(i));
        tbody.appendChild(tr);
    });

    setTimeout(() => {
        drawChartForSession(0);
        highlightTableRow(0);
    }, 0);
}

function rebuildSessionSelect(sessions) {
    const sessionSelect = document.getElementById("sessionSelect");
    sessionSelect.innerHTML = "";
    sessions.forEach((session, i) => {
        const start = parseTime(session[0].time);
        const end = parseTime(session[session.length - 1].time);
        const seconds = Math.floor((end - start) / 1000) || 1;
        let totalDamage = 0;
        session.forEach(r => totalDamage += r.damage);
        const dps = Math.floor(totalDamage / seconds);
        const option = document.createElement("option");
        option.value = i;
        option.textContent = `#${i + 1}  ${session[0].time}  (${formatNumber(dps)} dps)`;
        sessionSelect.appendChild(option);
    });
    sessionSelect.value = 0;
}

function selectSessionFromTable(index) {
    document.getElementById("sessionSelect").value = index;
    drawChartForSession(index);
    highlightTableRow(index);
}

function highlightTableRow(index) {
    document.querySelectorAll("#sessionsBody tr").forEach(row => row.classList.remove("active-session"));
    const row = document.getElementById(`session-row-${index}`);
    if (row) row.classList.add("active-session");
}

document.getElementById("rollingWindow").addEventListener("input", function() {
    document.getElementById("rollingWindowValue").textContent = this.value + "s";
    const index = parseInt(document.getElementById("sessionSelect").value) || 0;
    drawChartForSession(index);
});

function drawChartForSession(index) {
    const session = currentSessions[index];
    if (!session) return;
    const windowSize = parseInt(document.getElementById("rollingWindow").value);
    const raw = buildDpsTimeline(session);
    const rolling = buildRollingDps(raw, windowSize);
    const totalDamage = session.reduce((s, r) => s + r.damage, 0);
    const start = parseTime(session[0].time);
    const end = parseTime(session[session.length - 1].time);
    const seconds = Math.floor((end - start) / 1000) || 1;
    const avgDps = Math.round(totalDamage / seconds);
    drawChart(raw, rolling, windowSize, avgDps);
}

function buildDpsTimeline(session) {
    const timeline = [];
    const start = parseTime(session[0].time);
    session.forEach(hit => {
        const sec = Math.floor((parseTime(hit.time) - start) / 1000);
        if (!timeline[sec]) timeline[sec] = 0;
        timeline[sec] += hit.damage;
    });
    return timeline.map(v => v || 0);
}

function buildRollingDps(data, windowSize = 5) {
    const result = [];
    for (let i = 0; i < data.length; i++) {
        let sum = 0, count = 0;
        for (let j = i; j > i - windowSize && j >= 0; j--) { sum += data[j]; count++; }
        result.push(Math.round(sum / count));
    }
    return result;
}

function drawChart(data, rollingData, windowSize, avgDps) {
    const ctx = document.getElementById("dpsChart").getContext("2d");
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.map((_, i) => i + "s"),
            datasets: [
                {
                    label: `Rolling DPS (${windowSize}s)`,
                    data: rollingData,
                    borderColor: "#4a7fa5",
                    backgroundColor: "rgba(74,127,165,0.08)",
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0,
                    fill: true
                },
                {
                    label: "Avg DPS",
                    data: Array(rollingData.length).fill(avgDps),
                    borderColor: "rgba(240,168,48,0.6)",
                    borderWidth: 1,
                    borderDash: [6, 3],
                    pointRadius: 0,
                    fill: false,
                    tension: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 200 },
            interaction: {
                mode: "index",
                intersect: false
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: "#1e2130",
                    borderColor: "#3a3d50",
                    borderWidth: 1,
                    titleColor: "#5a6070",
                    bodyColor: "#c9cdd6",
                    titleFont: { family: "'Courier New', monospace", size: 10 },
                    bodyFont: { family: "'Courier New', monospace", size: 11 },
                    padding: 8,
                    callbacks: {
                        label: function(ctx) {
                            const label = ctx.datasetIndex === 0
                                ? `Rolling (${windowSize}s)`
                                : "Avg";
                            return " " + label + ": " + ctx.parsed.y.toLocaleString("ru-RU");
                        }
                    }
                }
            },
            scales: {
                x: { ticks: { color: "#3a4050", font: { size: 10 } }, grid: { color: "#1a1d28" } },
                y: { ticks: { color: "#3a4050", font: { size: 10 } }, grid: { color: "#1a1d28" } }
            }
        }
    });
}

function parseTime(t) {
    const [date, time] = t.split(" ");
    return new Date(`2024/${date} ${time}`);
}

function formatNumber(num) { return num.toLocaleString("ru-RU"); }

function getPercentColor(percent) {
    if (percent >= 80) return "#f0a830";
    if (percent >= 40) return "#f0a830";
    return "#f0a830";
}

// ===== SPLITTER =====
(function() {
    const splitter = document.getElementById("splitter");
    const chartPanel = document.getElementById("chartPanel");
    const content = splitter.parentElement;
    let startX, startWidth;

    splitter.addEventListener("mousedown", function(e) {
        startX = e.clientX;
        startWidth = chartPanel.offsetWidth;
        splitter.classList.add("dragging");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";

        function onMove(e) {
            const delta = startX - e.clientX;
            const newWidth = Math.max(200, Math.min(content.offsetWidth - 200, startWidth + delta));
            chartPanel.style.width = newWidth + "px";
            if (chart) chart.resize();
        }

        function onUp() {
            splitter.classList.remove("dragging");
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
        }

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
    });
})();

function copyRow(seconds, dmg, dps, percent) {
    const text =
`t: ${seconds}
dmg: ${formatNumber(dmg)}
dps: ${formatNumber(Math.floor(dps))}
hp: ${percent.toFixed(2)}%`;
    navigator.clipboard.writeText(text);
}

</script>
</body>
</html>
